<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro de Servicio — Cinépolis</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="loginScreen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);">
    <div class="login-box">
      <div class="login-logo">
        <div class="login-logo-icon">CP</div>
        <div>
          <div class="login-title">CENTRO DE SERVICIO</div>
          <div class="login-sub">Cinépolis · Sistema Sincronizado</div>
        </div>
      </div>
      <label class="login-label">Usuario</label>
      <input class="login-input" id="loginUser" type="text" placeholder="usuario" autocomplete="off">
      <label class="login-label">Contraseña</label>
      <input class="login-input" id="loginPass" type="password" placeholder="••••••••">
      <button class="login-btn" id="loginBtn">CONECTANDO...</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>

  <div id="app" style="display:none;">
    <header class="header">
      <div style="display:flex;align-items:center;">
        <div class="hlogo">CP</div>
        <div>
          <div class="htitle" id="headerTitle">CENTRO DE SERVICIO</div>
          <div class="hsub" id="headerSub">Gestión en la Nube</div>
        </div>
      </div>
      <div class="huser">
        <span class="live" id="liveBadge" style="display:none;"><div class="ldot"></div>En vivo</span>
        <span class="dbadge" id="fechaBadge" style="display:none;">—</span>
        <span class="hbadge" id="roleBadge"></span>
        <span style="font-size:12px;color:var(--text2);" id="userLabel"></span>
        <button class="logout-btn" id="logoutBtn">Salir</button>
      </div>
    </header>
    <nav class="nav" id="mainNav"></nav>
    <div class="main" id="mainContent"></div>
  </div>

  <div class="modal-bg" id="modalBg">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">
        <span>Detalle de Incidencia</span>
        <button class="modal-close" id="modalCloseBtn">✕</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <div class="modal-bg" id="modalUserBg">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:460px;">
      <div class="modal-title">
        <span id="userModalTitle">Usuario</span>
        <button class="modal-close" id="userModalCloseBtn">✕</button>
      </div>
      <div id="userModalContent"></div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="ui.js"></script>
  <script src="auth.js"></script>
  <script src="incidencias.js"></script>
  <script src="dashboard.js"></script>
  <script src="actualizador.js"></script>
  <script src="app.js"></script>
  <script src="usuarios.js"></script>

</body>
</html>
