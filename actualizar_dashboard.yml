name: Actualizar Dashboard

# Se activa cuando se sube el Excel O manualmente desde GitHub
on:
  push:
    paths:
      - 'Bases_de_datos.xlsx'   # Solo corre si cambia el Excel
  workflow_dispatch:             # Botón manual en GitHub → Actions

permissions:
  contents: write   # Necesario para hacer commit del HTML actualizado

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl numpy

      - name: Correr actualizador
        run: python actualizar_ci.py

      - name: Commit y push del HTML actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sistema_cinepolis.html
          git diff --cached --quiet || git commit -m "🤖 Dashboard actualizado $(date +'%d/%m/%Y %H:%M')"
          git push
